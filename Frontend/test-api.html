<!DOCTYPE html>
<html>
<head>
    <title>Test API Connection</title>
</head>
<body>
    <h1>Test API Connection</h1>
    <button onclick="testAPI()">Test API Call</button>
    <div id="result"></div>

    <script>
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing...';

            try {
                console.log('Starting fetch to: http://127.0.0.1/apitintireria/api/auth/login');

                const response = await fetch('http://127.0.0.1/apitintireria/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                    },
                    body: JSON.stringify({
                        username: 'test',
                        password: 'test'
                    })
                });

                console.log('Response received:', response);
                const data = await response.json();
                console.log('Response data:', data);

                resultDiv.innerHTML = `<pre>SUCCESS:\n${JSON.stringify(data, null, 2)}</pre>`;
            } catch (error) {
                console.error('Error details:', error);
                resultDiv.innerHTML = `<pre style="color: red;">ERROR:\n${error.message}\n\nCheck browser console for details</pre>`;
            }
        }
    </script>
</body>
</html>
